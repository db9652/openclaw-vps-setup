# OpenClaw VPS Setup — Docker Compose
# Usage: cp .env.example .env → fill in your keys → docker-compose up -d

services:
  openclaw:
    build: .
    container_name: openclaw-gateway
    restart: unless-stopped
    ports:
      - "127.0.0.1:18789:18789"  # Loopback only — access via SSH tunnel
    volumes:
      # Persist state across container restarts
      - openclaw-state:/home/openclaw/.openclaw
      # Mount workspace for easy editing from host
      - ./workspace:/home/openclaw/.openclaw/workspace
    env_file:
      - .env
    environment:
      - TZ=${TIMEZONE:-UTC}
    healthcheck:
      test: ["CMD", "openclaw", "health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  openclaw-state:
    driver: local
